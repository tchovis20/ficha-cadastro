<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ficha de Cadastro</title>
</head>
<body>
    <h1>Ficha de Cadastro de Funcionário</h1>
    <div class="dados-pessoais">
        <h2>Dados Pessoais</h2>
        <div>
            <label>Nome:</label>
            <input type="text" class="grande">
            <label>Nome Social:</label>
            <input type="text" class="medio">
            <label>Sexo:</label>
            <input type="text" class="pequeno">
        </div>
        <div>
            <label>Telefone:</label>
            <input type="text">
            <label>Data de Nascimento:</label>
            <input type="date">
            <label>Naturalidade:</label>
            <input type="text">
            <label>Cidade:</label>
            <input type="text">
        </div>
    </div>
</body>
</html>
